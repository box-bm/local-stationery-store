name: Release (build & distribute)

on:
  release:
    types: [published]

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  # Prevents curl HTTP/2 framing errors when downloading crates on Ubuntu runners.
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  # ── 1 ── Install Node deps and compile the frontend once.
  #         The dist/ output is shared with all platform build jobs.
  pre-config:
    name: Pre-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # ── 2 ── Compile the Tauri app and sign the installers on each platform.
  #         Runs in parallel once pre-config finishes.
  build-installers:
    name: Build installers
    needs: pre-config
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Build and sign installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ github.event.release.id }}
          includeUpdaterJson: true
          # dist/ is already built — skip the frontend step.
          beforeBuildCommand: ""
          args: ${{ matrix.args }}

  # ── 3 ── Wait for all platform builds, then verify the release assets
  #         and print a summary. Runs once all build-installers jobs pass.
  publish-release:
    name: Publish release
    needs: build-installers
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: List uploaded release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "### Release $TAG — uploaded assets" >> $GITHUB_STEP_SUMMARY
          gh release view "$TAG" \
            --repo "${{ github.repository }}" \
            --json assets \
            --jq '.assets[] | "- \(.name) (\(.size / 1024 / 1024 | floor) MB)"' \
            >> $GITHUB_STEP_SUMMARY
