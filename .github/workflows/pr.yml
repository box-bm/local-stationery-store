name: PR checks

# On pull requests, typecheck and run only the tests related to the files
# changed in the PR (Vitest --changed), to keep feedback fast.
on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-changed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so Vitest can diff against the base branch.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Run tests for changed files only
        # Vitest re-runs only test files whose module graph touches a file
        # changed since the base branch. Exits 0 if nothing is related.
        run: npx vitest run --changed origin/${{ github.base_ref }}
