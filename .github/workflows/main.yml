name: Main

# On merge/push to main: run the full test suite, then auto-determine the next
# version from conventional commits, bump it, and create a draft release.
# Publishing that draft triggers the build & distribute workflow (release.yml).
on:
  push:
    branches: [main]

concurrency:
  group: main
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run all tests
        run: npm test

      - name: Build frontend
        run: npm run build

  auto-release:
    name: Auto version & draft release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so next-version.cjs can reach the last tag.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine next version from conventional commits
        id: ver
        run: |
          NEXT=$(node scripts/next-version.cjs)
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          if [ "$NEXT" = "none" ]; then
            echo "No releasable commits found — skipping version bump and draft release."
          else
            CURRENT=$(node -p "require('./package.json').version")
            echo "Bump: $CURRENT → $NEXT"
          fi

      - name: Apply version bump
        if: steps.ver.outputs.next != 'none'
        run: node scripts/bump-version.cjs ${{ steps.ver.outputs.next }}

      - name: Commit and push version bump
        if: steps.ver.outputs.next != 'none'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          # Files may already be at the target version (e.g. manually pre-bumped).
          # Only commit if there is actually something staged.
          if git diff --cached --quiet; then
            echo "Version files already at ${{ steps.ver.outputs.next }} — skipping commit."
          else
            git commit -m "chore: bump version to ${{ steps.ver.outputs.next }} [skip ci]"
            git push
          fi

      - name: Create draft release
        if: steps.ver.outputs.next != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.ver.outputs.next }}"
          COMMIT=$(git rev-parse HEAD)
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving it as is."
          else
            gh release create "$TAG" \
              --draft \
              --title "Librería POS $TAG" \
              --generate-notes \
              --target "$COMMIT"
          fi

      - name: Summary
        if: steps.ver.outputs.next != 'none'
        run: |
          echo "### Draft release created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version bumped to **v${{ steps.ver.outputs.next }}**." >> $GITHUB_STEP_SUMMARY
          echo "Go to **Releases** on GitHub and publish the draft to trigger the build." >> $GITHUB_STEP_SUMMARY
