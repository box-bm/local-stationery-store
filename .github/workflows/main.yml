name: Main

# On merge/push to main: run the full test suite, then auto-determine the next
# version from conventional commits and create a draft release.
# Publishing that draft triggers the build & distribute workflow (release.yml).
#
# No commits are pushed back to main. The tag is created directly on the
# current commit via gh release create. release.yml patches the version files
# from the tag before building, so the repo files don't need to change here.
on:
  push:
    branches: [main]

concurrency:
  group: main
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run all tests
        run: npm test

      - name: Build frontend
        run: npm run build

  auto-release:
    name: Auto version & draft release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine next version from conventional commits
        id: ver
        run: |
          NEXT=$(node scripts/next-version.cjs)
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          if [ "$NEXT" = "none" ]; then
            echo "No releasable commits found — skipping draft release."
          else
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
            echo "Last tag: $LAST_TAG → next: $NEXT"
          fi

      - name: Create tag and draft release
        if: steps.ver.outputs.next != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.ver.outputs.next }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving it as is."
          else
            gh release create "$TAG" \
              --draft \
              --title "Librería POS $TAG" \
              --generate-notes \
              --target "$GITHUB_SHA"
            echo "Draft release $TAG created on $GITHUB_SHA."
          fi

      - name: Summary
        if: steps.ver.outputs.next != 'none'
        run: |
          echo "### Draft release ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tag **v${{ steps.ver.outputs.next }}** created on this commit." >> $GITHUB_STEP_SUMMARY
          echo "Go to **Releases** on GitHub and publish the draft to trigger the build." >> $GITHUB_STEP_SUMMARY
