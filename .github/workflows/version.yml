name: Bump version (manual override)

# Escape hatch for when you need to force a specific bump type
# (e.g. to cut a major release without a breaking-change commit).
#
# Normal flow: main.yml auto-detects the bump from conventional commits.
# Use this only when you need to override that behavior.
#
# Triggered from GitHub → Actions → "Bump version (manual override)" → Run workflow.
on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    name: Bump version (${{ inputs.bump_type }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Calculate new version
        id: ver
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          NEW=$(node scripts/bump-version.cjs --dry-run ${{ inputs.bump_type }})
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "new=$NEW"           >> $GITHUB_OUTPUT
          echo "Last tag: $LAST_TAG → new: $NEW"

      - name: Create tag and draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.ver.outputs.new }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving it as is."
          else
            gh release create "$TAG" \
              --draft \
              --title "Librería POS $TAG" \
              --generate-notes \
              --target "$GITHUB_SHA"
            echo "Draft release $TAG created."
          fi

      - name: Summary
        run: |
          echo "### Draft release ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**${{ steps.ver.outputs.last_tag }}** → **v${{ steps.ver.outputs.new }}** (${{ inputs.bump_type }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Go to **Releases** and publish the draft to trigger the build." >> $GITHUB_STEP_SUMMARY
